<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Animation</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:black;
    }

    canvas{
        display:block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
});

const stars = [];

const STAR_COUNT = 1400;

function random(min,max){
    return Math.random()*(max-min)+min;
}

function heartPoint(t, scale){

    const x = 16 * Math.pow(Math.sin(t),3);

    const y =
        13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

    return {
        x: w/2 + x * scale,
        y: h/2 - y * scale
    };
}

function createStars(){

    stars.length = 0;

    for(let i=0;i<STAR_COUNT;i++){

        stars.push({
            x: random(0,w),
            y: random(0,h),

            tx: random(0,w),
            ty: random(0,h),

            size: random(0.5,2),

            speed: random(0.01,0.03),

            color: "255,255,255",

            alpha: random(0.4,1)
        });
    }
}

createStars();

function setHeart(color="255,255,255"){

    stars.forEach(star => {

        const t = Math.random() * Math.PI * 2;

        const p = heartPoint(
            t,
            Math.min(w,h)/45
        );

        star.tx = p.x + random(-8,8);
        star.ty = p.y + random(-8,8);

        star.color = color;
    });
}

function scatter(){

    stars.forEach(star => {

        star.tx = random(0,w);
        star.ty = random(0,h);
    });
}

function setText(text){

    const off = document.createElement("canvas");
    const octx = off.getContext("2d");

    off.width = w;
    off.height = h;

    const fontSize =
        window.innerWidth < 600 ? 34 : 52;

    octx.fillStyle = "white";
    octx.textAlign = "center";
    octx.textBaseline = "middle";
    octx.font = `bold ${fontSize}px Arial`;

    const lines = text.split("\n");

    lines.forEach((line,index)=>{

        octx.fillText(
            line,
            w/2,
            h/2 + index*60
        );
    });

    const data = octx.getImageData(
        0,
        0,
        w,
        h
    ).data;

    let points = [];

    for(let y=0;y<h;y+=6){

        for(let x=0;x<w;x+=6){

            const index =
                (y*w + x) * 4;

            if(data[index+3] > 128){

                points.push({x,y});
            }
        }
    }

    stars.forEach((star,i)=>{

        const p =
            points[i % points.length];

        star.tx = p.x;
        star.ty = p.y;
    });
}

function animate(){

    ctx.clearRect(0,0,w,h);

    stars.forEach(star => {

        star.x +=
            (star.tx - star.x)
            * star.speed;

        star.y +=
            (star.ty - star.y)
            * star.speed;

        ctx.beginPath();

        ctx.fillStyle =
            `rgba(${star.color},${star.alpha})`;

        ctx.shadowBlur = 10;
        ctx.shadowColor =
            `rgb(${star.color})`;

        ctx.arc(
            star.x,
            star.y,
            star.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();


// ===== TIMELINE =====

// 1. tạo trái tim trắng
setHeart("255,255,255");

// 2. hiện text
setTimeout(()=>{

    setText(
`Chúc cô bé của anh
1/6 vui vẻ`
    );

},7000);

// 3. tan ra
setTimeout(()=>{

    scatter();

},14000);

// 4. tụ lại thành tim hồng
setTimeout(()=>{

    setHeart("255,105,180");

},19000);

</script>

</body>
</html>
