<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Animation</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;

    background:
    radial-gradient(
    circle at bottom,
    #111933 0%,
    #000 100%);

    font-family:
    'Dancing Script',
    cursive;
}

canvas{
    display:block;
}


/* ===== MESSAGE ===== */

.message{

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%)
    scale(0.7);

    color:white;

    text-align:center;

    line-height:1.5;

    font-size:
    clamp(32px,5vw,68px);

    opacity:0;

    transition:
    opacity 3s ease,
    transform 3s ease;

    text-shadow:
    0 0 10px rgba(255,255,255,0.9),
    0 0 25px rgba(255,192,203,0.7),
    0 0 50px rgba(255,105,180,0.6);

    z-index:10;

    pointer-events:none;
}

.message.show{

    opacity:1;

    transform:
    translate(-50%,-50%)
    scale(1);
}


/* ===== PHOTO ===== */

.photo{

    position:absolute;

    top:50%;
    left:50%;

    transform:
    translate(-50%,-50%)
    scale(0.7);

    width:min(80vw,320px);

    border-radius:28px;

    opacity:0;

    transition:
    opacity 4s ease,
    transform 4s ease;

    z-index:20;

    box-shadow:
    0 0 30px rgba(255,255,255,0.25),
    0 0 60px rgba(255,105,180,0.4);

    border:
    2px solid rgba(255,255,255,0.2);
}

.photo.show{

    opacity:1;

    transform:
    translate(-50%,-50%)
    scale(1);
}

</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="message" id="message">

    Chúc cô bé của anh<br>
    1/6 vui vẻ

</div>

<img
src="assets1.jpg"
class="photo"
id="photo"
/>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const message =
document.getElementById("message");

const photo =
document.getElementById("photo");

let w =
canvas.width =
window.innerWidth;

let h =
canvas.height =
window.innerHeight;

window.addEventListener(
"resize",
()=>{

    w =
    canvas.width =
    window.innerWidth;

    h =
    canvas.height =
    window.innerHeight;
}
);


// ====================
// STARS
// ====================

const stars = [];

const STAR_COUNT = 1500;

function random(min,max){

    return Math.random()
    * (max-min)
    + min;
}


// ===== HEART =====

function heartPoint(t,scale){

    const x =
    16 *
    Math.pow(
    Math.sin(t),
    3
    );

    const y =
    13 * Math.cos(t)
    - 5 * Math.cos(2*t)
    - 2 * Math.cos(3*t)
    - Math.cos(4*t);

    return {

        x:
        w/2 + x*scale,

        y:
        h/2 - y*scale
    };
}


// ===== CREATE STARS =====

function createStars(){

    stars.length = 0;

    for(
        let i=0;
        i<STAR_COUNT;
        i++
    ){

        stars.push({

            x: random(0,w),
            y: random(0,h),

            tx: random(0,w),
            ty: random(0,h),

            size:
            random(0.5,2),

            speed:
            random(
            0.015,
            0.04
            ),

            alpha:
            random(
            0.4,
            1
            ),

            color:
            "255,255,255"
        });
    }
}

createStars();


// ===== HEART =====

function setHeart(
color="255,255,255"
){

    stars.forEach(star => {

        const t =
        Math.random()
        * Math.PI
        * 2;

        const p =
        heartPoint(
            t,
            Math.min(w,h)/45
        );

        star.tx =
        p.x +
        random(-8,8);

        star.ty =
        p.y +
        random(-8,8);

        star.color =
        color;
    });
}


// ===== SCATTER =====

function scatter(){

    stars.forEach(star => {

        star.tx =
        random(0,w);

        star.ty =
        random(0,h);
    });
}


// ====================
// ANIMATION
// ====================

function animate(){

    ctx.clearRect(
    0,
    0,
    w,
    h
    );

    // background stars

    for(
        let i=0;
        i<70;
        i++
    ){

        ctx.beginPath();

        ctx.fillStyle =
        `rgba(
        255,
        255,
        255,
        ${Math.random()}
        )`;

        ctx.arc(
            Math.random()*w,
            Math.random()*h,
            Math.random()*1.2,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    // moving stars

    stars.forEach(star => {

        star.x +=
        (star.tx-star.x)
        * star.speed;

        star.y +=
        (star.ty-star.y)
        * star.speed;

        ctx.beginPath();

        ctx.fillStyle =
        `rgba(
        ${star.color},
        ${star.alpha}
        )`;

        ctx.shadowBlur = 10;

        ctx.shadowColor =
        `rgb(
        ${star.color}
        )`;

        ctx.arc(
            star.x,
            star.y,
            star.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    });

    requestAnimationFrame(
    animate
    );
}

animate();


// ====================
// TIMELINE
// ====================

// 0s
// tim trắng

setHeart(
"255,255,255"
);


// 10s
// hiện chữ

setTimeout(()=>{

    message.classList.add(
    "show"
    );

},10000);


// 20s
// chữ biến mất + tan ra

setTimeout(()=>{

    message.classList.remove(
    "show"
    );

    scatter();

},20000);


// 30s
// tim hồng

setTimeout(()=>{

    setHeart(
    "255,105,180"
    );

},30000);


// 40s
// hiện ảnh

setTimeout(()=>{

    photo.classList.add(
    "show"
    );

},40000);

</script>

</body>
</html>
