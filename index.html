<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Heart Stars</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background: radial-gradient(circle at bottom, #0b1020 0%, #000 100%);
    }

    canvas{
        display:block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    createHeart();
});

const stars = [];
const STAR_COUNT = 1200;

function heartFunction(t){
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y =
        13 * Math.cos(t) -
        5 * Math.cos(2 * t) -
        2 * Math.cos(3 * t) -
        Math.cos(4 * t);

    return { x, y };
}

function createHeart(){

    stars.length = 0;

    for(let i = 0; i < STAR_COUNT; i++){

        const t = Math.random() * Math.PI * 2;
        const heart = heartFunction(t);

        const scale = 18;

        const targetX = w / 2 + heart.x * scale;
        const targetY = h / 2 - heart.y * scale;

        stars.push({
            x: Math.random() * w,
            y: Math.random() * h,

            tx: targetX + (Math.random() - 0.5) * 20,
            ty: targetY + (Math.random() - 0.5) * 20,

            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.03 + 0.015,

            alpha: Math.random()
        });
    }
}

createHeart();

function drawBackgroundStars(){

    for(let i = 0; i < 150; i++){
        ctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
        ctx.beginPath();
        ctx.arc(
            Math.random() * w,
            Math.random() * h,
            Math.random() * 1.5,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }
}

function animate(){

    ctx.clearRect(0,0,w,h);

    drawBackgroundStars();

    stars.forEach(star => {

        star.x += (star.tx - star.x) * star.speed;
        star.y += (star.ty - star.y) * star.speed;

        star.alpha += (Math.random() - 0.5) * 0.05;

        if(star.alpha < 0.3) star.alpha = 0.3;
        if(star.alpha > 1) star.alpha = 1;

        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#fff";

        ctx.arc(
            star.x,
            star.y,
            star.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
